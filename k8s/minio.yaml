apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hairgen-minio-pvc
  namespace: hairgen
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hairgen-minio
  namespace: hairgen
  labels:
    app: hairgen-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hairgen-minio
  template:
    metadata:
      labels:
        app: hairgen-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              value: "hairgen-admin"
            - name: MINIO_ROOT_PASSWORD
              value: "hairgen-secret-2026"
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: hairgen-minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: hairgen-minio
  namespace: hairgen
  labels:
    app: hairgen-minio
spec:
  type: ClusterIP
  selector:
    app: hairgen-minio
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: api
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: console
---
apiVersion: v1
kind: Service
metadata:
  name: hairgen-minio-console
  namespace: hairgen
  labels:
    app: hairgen-minio
spec:
  type: NodePort
  selector:
    app: hairgen-minio
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30900
      protocol: TCP
      name: api
